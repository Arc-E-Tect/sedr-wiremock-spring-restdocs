response_field.username=When creating a new user account, this field will contain the username of the newly created account. This is the name provided by the user during account creation and will be returned in the response to confirm successful account creation. You can call the GET API using the provided username to retrieve the user's details.

request_field.consent=Because of regulatory requirements, users must provide when they create a new user account. This is required to ensure that the user is aware of the terms and conditions associated with account creation. The consent field must be set to true to proceed with account creation.
request_field.username=Unique username for the user account. This field must be alphanummeric or underscores. Usernames must be at least 3 characters long, but no longer than 30 characters. This username will be used to identify the user in the system and can be used to log in. The username must be provided in the GET API to retrieve the user's details.
request_field.password=The IFF policy for passwords statest that passwords must be at least 8 characters long, contain at least one uppercase letter, one lowercase letter, one digit, and one special character.

path_parameter.username=The username for which the user account is being retrieved. This is the same username as provided during account creation, and that is returned in the response body when the user account was successfully created.

request_header.accept=Request header to specify the desired response format, typically JSON.
request_header.x_api_key=API key for authentication, required for accessing the user account management endpoints.

