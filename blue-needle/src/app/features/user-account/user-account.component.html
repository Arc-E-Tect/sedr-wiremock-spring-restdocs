@if (loading()) {
  <p class="loading">Loading&hellip;</p>
}

@if (error()) {
  <div class="error-banner" role="alert">{{ error() }}</div>
}

<section class="panel">
  <div class="card-header">
    <h2>User Account Health</h2>
    <button type="button" (click)="refresh()" [disabled]="loading()">Refresh</button>
  </div>
  @if (healthStatus()) {
    <span class="status-pill"
          [class.pill-up]="healthStatus()!.status === 'UP'"
          [class.pill-down]="healthStatus()!.status === 'DOWN'"
          [class.pill-unknown]="healthStatus()!.status !== 'UP' && healthStatus()!.status !== 'DOWN'">
      {{ healthStatus()!.status }}
    </span>
  } @else if (!loading()) {
    <span class="status-pill pill-unknown">UNKNOWN</span>
  }
</section>

<section class="panel">
  <h2>Service Version</h2>
  @if (versionInfo()) {
    <p><strong>{{ versionInfo()!.versionName }}</strong> &mdash; v{{ versionInfo()!.versionCode }}</p>
  }
</section>
