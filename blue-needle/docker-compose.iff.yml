  social-network-wiremock:
    image: wiremock/wiremock:3.13.2-3
    platform: linux/amd64
    container_name: blue-needle-social-network-wiremock
    ports:
      - "8447:8443"
    volumes:
      - ./wiremock/social-network:/home/wiremock:ro
