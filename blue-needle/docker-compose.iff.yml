      - "--verbose"

  relationship-wiremock:
    image: wiremock/wiremock:3.13.2-3
    platform: linux/amd64
    container_name: blue-needle-relationship-wiremock
    ports:
      - "8446:8443"
    volumes:
      - ./wiremock/relationship:/home/wiremock:ro
    command:
      - "--https-port"
