# Blue Needle — IFF WireMock constellation
#
# Currently only system-admin is wired up (fully implemented micro-frontend).
# Uncomment additional services as each micro-frontend is implemented.
#
# Stubs must be prepared before starting:
#   npm run stubs:prepare
#
# Start:  npm run wiremock:up
# Stop:   npm run wiremock:down

services:
  system-admin-wiremock:
    image: wiremock/wiremock:3.13.2-3
    platform: linux/amd64
    container_name: blue-needle-system-admin-wiremock
    ports:
      - "8443:8443"
    volumes:
      - ./wiremock/system-admin:/home/wiremock:ro
    command:
      - "--https-port"
      - "8443"
      - "--global-response-templating"
      - "--verbose"

  user-account-wiremock:
    image: wiremock/wiremock:3.13.2-3
    platform: linux/amd64
    container_name: blue-needle-user-account-wiremock
